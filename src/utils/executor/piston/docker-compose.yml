
services:
  api:
    image: ghcr.io/engineer-man/piston
    container_name: piston-api
    platform: linux/amd64
    restart: always
    ports:
      - "5050:2000"
    volumes:
      # Mount the packages directory so installed languages persist
      - piston_packages:/piston/packages
    # Important: Piston requires privileged mode to use isolate mechanisms inside the container
    privileged: true
    environment:
      - PISTON_RUN_TIMEOUT=10000
      - PISTON_COMPILE_TIMEOUT=10000
      - PISTON_OUTPUT_MAX_SIZE=1048576

volumes:
  piston_packages:
