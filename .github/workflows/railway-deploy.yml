name: Railway Deploy

on:
  push:
    branches:
      - development

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Deploy to Railway
        uses: railwayapp/github-action@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
